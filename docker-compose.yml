services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      API_PORT: 8787
    ports:
      - "127.0.0.1:8787:8787"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
